<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Poker API Debug</title>
<style>body{font-family:monospace;background:#0a0a0f;color:#e8e8f0;padding:20px;max-width:600px;margin:0 auto}
.ok{color:#4ade80}.fail{color:#ef4444}.warn{color:#facc15}button{background:#1a472a;color:#4ade80;border:1px solid #2d6a4f;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:10px 0}
pre{background:#12121a;padding:10px;border-radius:8px;overflow:auto;font-size:12px;white-space:pre-wrap}</style>
</head><body>
<h2>🃏 Poker Supabase Debug</h2>
<p>This page tests the exact same API calls the poker quiz makes.</p>
<button onclick="runTest()">Run Full Test</button>
<div id="log"></div>
<script>
const URL = 'https://yneylmouahusugiwgjek.supabase.co/rest/v1/poker_submissions';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZXlsbW91YWh1c3VnaXdnamVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzIyMTAsImV4cCI6MjA5MjYwODIxMH0.jdf4xeu8vZJfL82zqMh6moMVQ9fG3r2AhJfyZWXybMg';
const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };
const log = document.getElementById('log');
function out(cls, msg, detail) {
  log.innerHTML += '<p class="'+cls+'">'+msg+'</p>';
  if (detail) log.innerHTML += '<pre>'+JSON.stringify(detail,null,2)+'</pre>';
}
async function runTest() {
  log.innerHTML = '';
  const name = '__debug_' + Date.now();
  const startedAt = new Date().toISOString();
  out('warn', '1️⃣ Inserting initial record: ' + name);
  try {
    const r1 = await fetch(URL + '?on_conflict=name,started_at', {
      method: 'POST',
      headers: { ...HEADERS, Prefer: 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({name, score:0, total:10, total_ms:0, avg_ms:0, accuracy:0, status:'in_progress', questions_answered:0, current_section:'practice', answers:[], section2:[], started_at:startedAt, completed_at:null})
    });
    const d1 = await r1.json();
    out(r1.ok?'ok':'fail', 'Insert: HTTP ' + r1.status, d1);
  } catch(e) { out('fail', '❌ Insert FAILED: ' + e.message); return; }

  out('warn', '2️⃣ Upserting with answer data...');
  try {
    const r2 = await fetch(URL + '?on_conflict=name,started_at', {
      method: 'POST',
      headers: { ...HEADERS, Prefer: 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({name, score:1, total:10, total_ms:5000, avg_ms:5000, accuracy:100, status:'in_progress', questions_answered:1, current_section:'section1', answers:[{questionId:1,correct:true,timeMs:5000}], section2:[], started_at:startedAt, completed_at:null})
    });
    const d2 = await r2.json();
    out(r2.ok?'ok':'fail', 'Upsert: HTTP ' + r2.status, d2);
    if (r2.ok && d2[0] && d2[0].score === 1) {
      out('ok', '✅ UPSERT WORKED — score updated to 1');
    } else {
      out('fail', '❌ Upsert returned but score not updated');
    }
  } catch(e) { out('fail', '❌ Upsert FAILED: ' + e.message); return; }

  out('warn', '3️⃣ Reading back all submissions...');
  try {
    const r3 = await fetch(URL + '?select=name,score,status&order=created_at.desc&limit=5', { headers: HEADERS });
    const d3 = await r3.json();
    out(r3.ok?'ok':'fail', 'Read: HTTP ' + r3.status, d3);
  } catch(e) { out('fail', '❌ Read FAILED: ' + e.message); }

  out('warn', '4️⃣ Cleaning up test row...');
  try {
    await fetch(URL + '?name=like.__debug_*', { method: 'DELETE', headers: HEADERS });
    out('ok', 'Cleanup done');
  } catch(e) { out('warn', 'Cleanup failed (ok, RLS blocks deletes): ' + e.message); }

  out('ok', '🏁 Test complete');
}
</script></body></html>
