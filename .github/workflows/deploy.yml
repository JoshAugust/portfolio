name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: SPA routing — copy index.html to all client-side routes
        run: |
          cp dist/index.html dist/404.html
          mkdir -p dist/orchestra
          cp dist/index.html dist/orchestra/index.html
          mkdir -p dist/prospector
          cp dist/index.html dist/prospector/index.html
          mkdir -p dist/poker
          cp dist/index.html dist/poker/index.html
          mkdir -p dist/poker/admin
          cp dist/index.html dist/poker/admin/index.html
          mkdir -p dist/finchex
          cp dist/index.html dist/finchex/index.html
          mkdir -p dist/music
          cp dist/index.html dist/music/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
